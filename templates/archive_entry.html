            <a href="cards/{{DATE}}-{{SLUG}}.html" class="archive-card">
                <img src="{{IMAGE_PATH}}" alt="{{TITLE}}" class="archive-card-image" loading="lazy">
                <div class="archive-card-content">
                    <h3 class="archive-card-title">{{TITLE}}</h3>
                    <div class="archive-card-meta">
                        <time class="archive-card-date" datetime="{{DATE}}">{{DATE_DISPLAY}}</time>
                        <span class="archive-card-category">{{CATEGORY}}</span>
                    </div>
                    <p class="archive-card-excerpt">{{EXCERPT}}</p>
                </div>
            </a>
